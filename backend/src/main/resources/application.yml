spring:
  application:
    name: jmro-queue

  datasource:
    url: jdbc:postgresql://localhost:5432/jkn_db
    username: jkn_user
    password: jkn_password
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: JknHikariPool
      maximum-pool-size: 15
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      # TASK-02-B: Timeout Matrix - DB connection pool timeout 5s to prevent stuck threads
      connection-timeout: 5000
      register-mbeans: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      jakarta.persistence.query.timeout: 5000
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true

server:
  address: 0.0.0.0
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,loggers,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: jmro-queue

info:
  app:
    name: JKN Mobile Redesign - Queue Service
    version: 0.0.1-SNAPSHOT

# TASK-02-B: Timeout Matrix - HTTP Handler Timeout 10s
server.connection-timeout: 10000

# TASK-02-A: Rate Limiting
app:
  rate-limit:
    limit: 5
    window-seconds: 60

