spring:
  application:
    name: jmro-queue

  datasource:
    url: jdbc:postgresql://localhost:5432/jkn_db
    username: jkn_user
    password: jkn_password
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: JknHikariPool
      maximum-pool-size: 20
      minimum-idle: 10
      max-lifetime: 1800000
      idle-timeout: 600000
      connection-timeout: 5000
      leak-detection-threshold: 30000
      register-mbeans: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      jakarta.persistence.query.timeout: 5000
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true

server:
  address: 0.0.0.0
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,loggers,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: jmro-queue

info:
  app:
    name: JKN Mobile Redesign - Queue Service
    version: 0.0.1-SNAPSHOT

