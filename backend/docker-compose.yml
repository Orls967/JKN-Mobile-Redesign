version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: jkn-postgres
    environment:
      POSTGRES_DB: jkn_db
      POSTGRES_USER: jkn_user
      POSTGRES_PASSWORD: jkn_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
