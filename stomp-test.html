<!DOCTYPE html>
<html>
<head>
    <title>STOMP Queue Tester</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #output { background: #f4f4f4; padding: 15px; border-radius: 5px; min-height: 100px; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Story 2.1 WebSocket Verifier</h2>
    <p>Status: <span id="status">Initializing...</span></p>
    <h3>Events Received:</h3>
    <pre id="output"></pre>

    <script>
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');

        const stompClient = new StompJs.Client({
            webSocketFactory: () => new SockJS('http://localhost:8080/ws-queue'),
            onConnect: (frame) => {
                statusEl.innerHTML = '<span class="success">Connected to /ws-queue! Subscribed to /topic/queue/1</span>';
                
                stompClient.subscribe('/topic/queue/1', (message) => {
                    const msg = JSON.parse(message.body);
                    console.log('Event received:', msg);
                    outputEl.innerText += JSON.stringify(msg, null, 4) + '\n\n';
                });
            },
            onStompError: (frame) => {
                statusEl.innerText = 'Error: ' + frame.headers['message'];
            },
            onWebSocketClose: () => {
                statusEl.innerText = 'Disconnected.';
            }
        });

        stompClient.activate();
    </script>
</body>
</html>
